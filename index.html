<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 min-h-screen flex items-center justify-center px-4">
    <main class="bg-white p-6 rounded-2xl shadow-lg w-full max-w-lg">
      <header class="mb-6 text-center">
        <h1 class="text-3xl font-bold text-blue-600">Todo App</h1>
      </header>

      <!-- Form -->
      <form id="taskForm" class="flex flex-col sm:flex-row gap-3 mb-5">
        <input
          id="taskInput"
          type="text"
          placeholder="Write your task..."
          class="flex-1 border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
        <button
          type="submit"
          class="bg-blue-500 text-white px-6 py-2 rounded-md hover:bg-blue-600 transition"
        >
          Add
        </button>
      </form>

      <!-- Task list -->
      <section id="taskList" class="space-y-3"></section>
    </main>

    <!-- Script -->
    <script src="script.js"></script>
  </body>
</html>
